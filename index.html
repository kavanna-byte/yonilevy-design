  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:    #1f1f1f;
      --white:    #ffffff;
      --gray:     #8f8f8f;
      --light:    #f2f2f2;
      --font:     'Josefin Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      color: var(--black);
      background: var(--white);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }

    /* ─── Header / Nav ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      padding: 0 40px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-wrap img {
      width: 54px;
      height: 54px;
      object-fit: contain;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--black);
      line-height: 1;
      -webkit-text-stroke: 0.5px var(--black);
    }

    .logo-sub {
      font-size: 7px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555555;
      line-height: 1.6;
    }

    nav {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    nav a {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gray);
      transition: color 0.2s;
    }

    nav a:hover,
    nav a.active {
      color: var(--black);
    }

    /* ─── Gallery Grid (Home) ─── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
    }

    .gallery-item {
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.04);
    }

    /* ─── Quote Section ─── */
    .quote-section {
      background: var(--black);
      padding: 90px 60px;
      text-align: center;
    }

    .quote-text {
      font-size: clamp(18px, 2.8vw, 32px);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.5;
      text-transform: uppercase;
      color: var(--gray);
      max-width: 860px;
      margin: 0 auto 20px;
    }

    .quote-text .highlight {
      color: var(--white);
    }

    .quote-attr {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ─── Contact Section ─── */
    .contact-section {
      padding: 80px 40px;
      max-width: 680px;
      margin: 0 auto;
    }

    .contact-section h2 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 40px;
      text-align: center;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--black);
      background: transparent;
      border: none;
      border-bottom: 1px solid #d0d0d0;
      padding: 14px 4px;
      outline: none;
      transition: border-color 0.2s;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 10px;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-bottom-color: var(--black);
    }

    .contact-form textarea {
      resize: none;
      height: 100px;
      margin-top: 10px;
    }

    .send-btn {
      margin-top: 28px;
      align-self: flex-start;
      background: none;
      border: 1px solid var(--black);
      font-family: var(--font);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--black);
      padding: 10px 28px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .send-btn:hover {
      background: var(--black);
      color: var(--white);
    }

    /* ─── Clients Section ─── */
    .clients-section {
      background: var(--light);
      padding: 60px 40px;
      text-align: center;
    }

    .clients-section h3 {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 40px;
    }

    .clients-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 40px 60px;
      max-width: 900px;
      margin: 0 auto;
    }

    .clients-grid img {
      height: 44px;
      width: auto;
      object-fit: contain;
      filter: grayscale(100%);
      opacity: 0.6;
      transition: opacity 0.2s, filter 0.2s;
    }

    .clients-grid img:hover {
      opacity: 1;
      filter: grayscale(0%);
    }

    /* ─── Footer ─── */
    footer {
      background: var(--white);
      border-top: 1px solid rgba(0,0,0,0.07);
      padding: 22px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-copy {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .social-links {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .social-links a {
      color: var(--gray);
      transition: color 0.2s;
    }

    .social-links a:hover {
      color: var(--black);
    }

    .social-links svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      header {
        padding: 0 20px;
        height: 60px;
        flex-wrap: wrap;
        height: auto;
        padding: 14px 20px;
        gap: 12px;
      }

      nav {
        gap: 18px;
      }

      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }

      .quote-section {
        padding: 60px 28px;
      }

      .clients-grid {
        gap: 28px 36px;
      }
    }

    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
