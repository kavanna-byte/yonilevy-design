  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #1f1f1f;
      --white:  #ffffff;
      --gray:   #8f8f8f;
      --light:  #f2f2f2;
      --font:   'Josefin Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      color: var(--black);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }

    /* ─── Header / Nav ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      padding: 0 40px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-wrap img {
      width: 54px;
      height: 54px;
      object-fit: contain;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--black);
      line-height: 1;
      -webkit-text-stroke: 0.5px var(--black);
    }

    .logo-sub {
      font-size: 7px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555555;
      line-height: 1.6;
    }

    nav {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    nav a {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gray);
      transition: color 0.2s;
    }

    nav a:hover,
    nav a.active {
      color: var(--black);
    }

    /* ─── Masonry Gallery ─── */
    .ads-masonry {
      columns: 3;
      column-gap: 0;
      padding: 0;
      background: var(--white);
    }

    .ads-masonry .gallery-item {
      break-inside: avoid;
      margin-bottom: 0;
      overflow: hidden;
      cursor: zoom-in;
      position: relative;
    }

    .ads-masonry .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.45s ease;
    }

    .ads-masonry .gallery-item:hover img {
      transform: scale(1.035);
      filter: brightness(1.06);
    }

    /* ─── Lightbox ─── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      padding: 20px;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      animation: lb-in 0.2s ease;
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 28px;
      color: rgba(255,255,255,0.7);
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: #fff; }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 32px;
      cursor: pointer;
      padding: 20px;
      transition: color 0.2s;
      user-select: none;
      line-height: 1;
    }

    .lightbox-nav:hover { color: #fff; }
    .lightbox-prev { left: 10px; }
    .lightbox-next { right: 10px; }

    @keyframes lb-in {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ─── Footer ─── */
    footer {
      background: var(--white);
      border-top: 1px solid rgba(0,0,0,0.07);
      padding: 22px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-copy {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .social-links {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .social-links a {
      color: var(--gray);
      transition: color 0.2s;
    }

    .social-links a:hover {
      color: var(--black);
    }

    .social-links svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .ads-masonry { columns: 2; }
    }

    @media (max-width: 768px) {
      header {
        padding: 14px 20px;
        height: auto;
        flex-wrap: wrap;
        gap: 12px;
      }
      nav { gap: 18px; }
    }

    @media (max-width: 480px) {
      .ads-masonry { columns: 1; }
    }
  </style>

  <script>
    // ── Lightbox Logic ──
    const items  = Array.from(document.querySelectorAll('.gallery-item img'));
    const lb     = document.getElementById('lightbox');
    const lbImg  = document.getElementById('lb-img');
    let current  = 0;

    function openLightbox(index) {
      current = index;
      lbImg.src = items[index].src;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + items.length) % items.length;
      lbImg.src = items[current].src;
    }

    items.forEach((img, i) => {
      img.parentElement.addEventListener('click', () => openLightbox(i));
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); navigate(-1); });
    document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); navigate(1); });

    lb.addEventListener('click', (e) => {
      if (e.target === lb) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });
  </script>
